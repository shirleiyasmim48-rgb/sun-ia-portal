<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sun IA</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <!-- Tela de Login / Setup -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <h1 class="brand">Sun IA</h1>
      
      <!-- Formulário de Setup (Primeiro Acesso) -->
      <form id="setup-form" class="auth-form hidden">
        <p style="color: var(--gold); margin-bottom: 20px;">Crie sua conta de administrador</p>
        <input type="text" placeholder="Usuário" required>
        <input type="password" placeholder="Senha" required>
        <button type="submit" class="btn-gold">Criar Conta</button>
      </form>

      <!-- Formulário de Login (Acesso Normal) -->
      <form id="login-form" class="auth-form hidden">
        <input type="text" placeholder="Usuário" required>
        <input type="password" placeholder="Senha" required>
        <button type="submit" class="btn-gold">Entrar</button>
      </form>

      <div id="login-error"></div>
    </div>
  </div>

  <!-- Tela Principal -->
  <div id="main-screen" class="screen">
    <!-- Header Mobile -->
    <header class="mobile-header">
      <button id="menu-toggle" class="menu-toggle">
        <i class="fas fa-bars"></i>
      </button>
      <h2>Sun IA</h2>
      <div style="width: 24px;"></div> <!-- Espaçador -->
    </header>

    <!-- Menu Lateral (Sidebar) -->
    <aside id="sidebar" class="sidebar">
      <h2 class="brand" style="font-size: 1.5rem; margin-bottom: 30px; text-align: center;">Sun IA</h2>
      <nav>
        <div class="nav-item active" data-mode="chat">
          <i class="fas fa-comments"></i>
          <span>Chat IA</span>
        </div>
        <div class="nav-item" data-mode="image">
          <i class="fas fa-image"></i>
          <span>IA de Imagem</span>
        </div>
        <div class="nav-item" data-mode="game">
          <i class="fas fa-gamepad"></i>
          <span>IA de Jogos</span>
        </div>
        <div class="nav-item" data-mode="site">
          <i class="fas fa-globe"></i>
          <span>IA de Sites</span>
        </div>
      </nav>
      
      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #333;">
        <div class="nav-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Sair</span>
        </div>
      </div>
    </aside>

    <!-- Overlay para fechar menu mobile -->
    <div id="overlay" class="overlay"></div>

    <!-- Área de Conteúdo -->
    <main class="content-area">
      <div id="chat-messages">
        <div class="message ai">Olá! Eu sou o Sun IA. Como posso ajudar você hoje?</div>
      </div>
      
      <div id="typing-indicator" class="hidden" style="color: var(--text-gray); font-size: 0.8rem; margin-bottom: 10px; padding-left: 10px;">
        Sun IA está digitando...
      </div>

      <div class="input-container">
        <textarea id="chat-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
        <button id="send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
